version: '3'

tasks:
  build:
    desc: Build the mdv binary
    cmds:
      - go build -tags desktop,production -o mdv ./cmd/mdv

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f mdv

  install:
    desc: Install mdv to GOPATH/bin
    cmds:
      - go install -tags desktop,production ./cmd/mdv
